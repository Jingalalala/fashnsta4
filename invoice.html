<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
      padding: 30px;
    }

    .invoice-box {
      max-width: 850px;
      margin: auto;
      background: white;
      padding: 40px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .top {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 30px;
    }

    .brand h1 {
      margin: 0;
      color: #c8a000;
    }

    .brand p {
      margin-top: 8px;
      color: #666;
    }

    .section {
      margin-bottom: 24px;
    }

    .section h3 {
      margin-bottom: 10px;
      color: #c8a000;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      border-bottom: 1px solid #eee;
      padding: 14px 10px;
      text-align: left;
    }

    th {
      background: #faf7ea;
    }

    .total {
      text-align: right;
      margin-top: 25px;
      font-size: 20px;
      font-weight: bold;
      color: #111;
    }

    .print-btn {
      margin-top: 30px;
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      background: gold;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    @media print {
      .print-btn {
        display: none;
      }

      body {
        background: white;
        padding: 0;
      }

      .invoice-box {
        box-shadow: none;
        border-radius: 0;
      }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-api.js"></script>
</head>
<body>
  <div class="invoice-box" id="invoiceBox">
    <div class="top">
      <div class="brand">
        <h1>FASHNTA</h1>
        <p>Luxury Fashion Invoice</p>
      </div>
      <div>
        <p><strong>Invoice Date:</strong> <span id="invoiceDate"></span></p>
        <p><strong>Order ID:</strong> <span id="invoiceOrderId"></span></p>
      </div>
    </div>

    <div class="section">
      <h3>Customer Details</h3>
      <p><strong>Name:</strong> <span id="customerName"></span></p>
      <p><strong>Phone:</strong> <span id="customerPhone"></span></p>
      <p><strong>Address:</strong> <span id="customerAddress"></span></p>
      <p><strong>Payment:</strong> <span id="paymentMethod"></span></p>
      <p><strong>Status:</strong> <span id="orderStatus"></span></p>
    </div>

    <div class="section">
      <h3>Order Items</h3>
      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="invoiceItems"></tbody>
      </table>
    </div>

    <div class="total" id="invoiceTotal">Total: ₹0</div>

    <button class="print-btn" onclick="window.print()">Print Invoice</button>
  </div>

  <script>
    async function loadInvoice() {
      const params = new URLSearchParams(window.location.search);
      const queryOrderId = params.get("order");
      const selectedOrderId = queryOrderId || localStorage.getItem("currentInvoiceOrderId");
      const latestOrder = JSON.parse(localStorage.getItem("latestOrder")) || null;
      const allOrders = JSON.parse(localStorage.getItem("fashnta_orders")) || [];

      let order = null;
      if (selectedOrderId && window.fetchOrderById) {
        try { order = await fetchOrderById(selectedOrderId); } catch(e) {}
      }
      if (!order && selectedOrderId) {
        order = allOrders.find(o => o.orderId === selectedOrderId || o.id === selectedOrderId || o.order_number === selectedOrderId);
      }
      if (!order && latestOrder) {
        order = latestOrder;
      }

      if (!order) {
        document.getElementById("invoiceBox").innerHTML = "<h2>No invoice found.</h2>";
        return;
      }

      document.getElementById("invoiceDate").textContent = order.date || "N/A";
      document.getElementById("invoiceOrderId").textContent = order.orderId || "N/A";
      document.getElementById("customerName").textContent = order.customerName || "N/A";
      document.getElementById("customerPhone").textContent = order.phone || "N/A";
      document.getElementById("customerAddress").textContent = order.address || "N/A";
      document.getElementById("paymentMethod").textContent = order.paymentMethod || "Cash on Delivery";
      document.getElementById("orderStatus").textContent = order.status || "Pending";

      const itemsEl = document.getElementById("invoiceItems");
      itemsEl.innerHTML = "";

      let total = 0;

      (order.items || []).forEach(item => {
        const qty = Number(item.qty || 1);
        const price = Number(item.price || 0);
        const itemTotal = qty * price;
        total += itemTotal;

        itemsEl.innerHTML += `
          <tr>
            <td>${item.name || "Item"}</td>
            <td>${qty}</td>
            <td>₹${price.toLocaleString("en-IN")}</td>
            <td>₹${itemTotal.toLocaleString("en-IN")}</td>
          </tr>
        `;
      });

      document.getElementById("invoiceTotal").textContent = `Total: ₹${Number(order.total || total).toLocaleString("en-IN")}`;

      localStorage.removeItem("currentInvoiceOrderId");
    }

    document.addEventListener("DOMContentLoaded", loadInvoice);
  </script>
</body>
</html>
