<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fashnta Admin Login</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0d0d0d, #161616);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      background: rgba(20, 20, 20, 0.95);
      padding: 35px;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 215, 0, 0.15);
      backdrop-filter: blur(10px);
    }

    .brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .brand h1 {
      margin: 0;
      color: gold;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .brand p {
      margin-top: 8px;
      color: rgba(255,255,255,0.65);
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 15px 16px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      outline: none;
      background: #1f1f1f;
      color: white;
      font-size: 15px;
    }

    input:focus {
      border-color: rgba(255, 215, 0, 0.55);
      box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.08);
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(90deg, #d4af37, #ffd700);
      color: black;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .error {
      color: #ff6b6b;
      text-align: center;
      margin-top: 12px;
      font-size: 14px;
      min-height: 20px;
    }

    .hint {
      text-align: center;
      margin-top: 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="brand">
      <h1>FASHNTA ADMIN</h1>
      <p>Secure Dashboard Access</p>
    </div>

    <input type="text" id="adminUser" placeholder="Admin Username" />
    <input type="password" id="adminPass" placeholder="Admin Password" />
    <button onclick="loginAdmin()">Login</button>

    <div class="error" id="errorMsg"></div>
    <div class="hint">Authorized access only</div>
  </div>

  <script>
    const ADMIN_USER = "admin";
    const ADMIN_PASS = "admin";

    function loginAdmin() {
      const user = document.getElementById("adminUser").value.trim();
      const pass = document.getElementById("adminPass").value.trim();
      const error = document.getElementById("errorMsg");

      if (user === ADMIN_USER && pass === ADMIN_PASS) {
        localStorage.setItem("fashnta_admin_auth", "true");
        sessionStorage.setItem("fashnta_admin_session", "active");
        window.location.href = "admin.html";
      } else {
        error.textContent = "Invalid username or password";
      }
    }

    document.addEventListener("keydown", function(e) {
      if (e.key === "Enter") loginAdmin();
    });

    if (localStorage.getItem("fashnta_admin_auth") === "true") {
      window.location.href = "admin.html";
    }
  </script>
</body>
</html>
