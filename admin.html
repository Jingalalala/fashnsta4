<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FASHNTA Admin</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body { font-family: Arial; background:#f5f5f5; margin:0; }
    .wrap { max-width:1000px; margin:40px auto; padding:20px; }
    .card { background:white; padding:20px; border-radius:16px; margin-bottom:20px; }
    input, button, select {
      padding:10px;
      border-radius:10px;
      border:1px solid #ddd;
      margin:5px 0;
      width:100%;
    }
    button { background:#c9a227; color:white; border:none; cursor:pointer; }
    table { width:100%; border-collapse: collapse; }
    th, td { padding:10px; border-bottom:1px solid #eee; }
    .hidden { display:none; }
  </style>
</head>
<body>

<div id="loginScreen" class="wrap">
  <div class="card">
    <h2>Admin Login</h2>
    <input id="uid" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="err" style="color:red;"></p>
  </div>
</div>

<div id="adminPanel" class="wrap hidden">
  <div class="card">
    <h2>Admin Panel</h2>
    <p id="who"></p>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <input id="search" placeholder="Search">
    <button onclick="render()">Refresh</button>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Product</th>
          <th>Status</th>
          <th>Update</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody id="orders"></tbody>
    </table>
  </div>
</div>

<script src="./js/admin.js"></script>
</body>
</html>
