<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FASHNTA Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="admin-body">

  <!-- LOGIN SCREEN -->
  <section id="adminLoginScreen" class="admin-login-screen">
    <div class="admin-login-card">
      <h1>FASHNTA ADMIN</h1>
      <p>Authorized Access Only</p>

      <input type="text" id="adminUid" placeholder="Enter UID" />
      <input type="password" id="adminPassword" placeholder="Enter Password" />
      <button id="adminLoginBtn">Login</button>

      <p id="adminLoginError" class="admin-error"></p>
    </div>
  </section>

  <!-- ADMIN PANEL -->
  <section id="adminPanel" class="admin-panel hidden">
    <header class="admin-header">
      <div>
        <h1>Admin Dashboard</h1>
        <p>Manage Orders</p>
      </div>
      <button id="adminLogoutBtn" class="logout-btn">Logout</button>
    </header>

    <div class="admin-stats">
      <div class="stat-card">
        <h3>Total Orders</h3>
        <p id="totalOrders">0</p>
      </div>
      <div class="stat-card">
        <h3>Pending</h3>
        <p id="pendingOrders">0</p>
      </div>
      <div class="stat-card">
        <h3>Shipped</h3>
        <p id="shippedOrders">0</p>
      </div>
      <div class="stat-card">
        <h3>Delivered</h3>
        <p id="deliveredOrders">0</p>
      </div>
    </div>

    <div class="admin-toolbar">
      <input type="text" id="searchOrders" placeholder="Search by order no / customer / product..." />
      <button id="refreshOrdersBtn">Refresh</button>
    </div>

    <div class="orders-table-wrap">
      <table class="orders-table">
        <thead>
          <tr>
            <th>Order No</th>
            <th>Customer</th>
            <th>Phone</th>
            <th>Product</th>
            <th>Size</th>
            <th>Qty</th>
            <th>Total</th>
            <th>Address</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="ordersTableBody">
          <tr>
            <td colspan="11" class="empty-row">No orders found</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
