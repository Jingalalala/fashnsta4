<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shop | FASHNSTA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background: #000;
      color: #fff;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid #333;
    }

    header h1 {
      color: gold;
      letter-spacing: 2px;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    nav a:hover {
      color: gold;
    }

    .container {
      padding: 40px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 30px;
    }

    .product-card {
      background: #111;
      padding: 15px;
      border: 1px solid #222;
      text-align: center;
      transition: 0.3s;
    }

    .product-card:hover {
      border-color: gold;
      transform: translateY(-5px);
    }

    .product-card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .product-card h3 {
      margin: 10px 0;
    }

    .price {
      color: gold;
      font-weight: bold;
    }

    button {
      background: gold;
      color: black;
      border: none;
      padding: 10px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    button:hover {
      opacity: 0.8;
    }

    .view-btn {
      display: block;
      margin-top: 10px;
      color: gold;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
  <h1>FASHNSTA</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart</a>
  </nav>
</header>

<div class="container">
  <h2>Shop Collection</h2>

  <!-- ✅ ONLY dynamic content -->
  <div id="products-container" class="products-grid"></div>
</div>

<!-- JS FILES -->
<script src="js/supabase.js"></script>
<script src="js/supabase-api.js"></script>
<script src="js/store.js"></script>
<script src="js/ui.js"></script>
<script src="js/products.js"></script>

</body>
</html>
